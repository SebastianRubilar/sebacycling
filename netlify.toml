[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/ai/analyze"
  to = "/.netlify/functions/ai-analyze"
  status = 200

[[redirects]]
  from = "/api/strava/*"
  to = "/.netlify/functions/strava-proxy/:splat"
  status = 200

[[redirects]]
  from = "/auth/callback"
  to = "/.netlify/functions/strava-auth"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
